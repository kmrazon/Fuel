<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vehicle Expenditure</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#121212">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-color: #121212; --card-bg: #1e1e1e; --accent: #ff6b00;
            --text-primary: #ffffff; --text-secondary: #a1a1aa; --border: #333333;
        }

        /* --- THE HORIZONTAL SCROLL KILLER --- */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow-x: hidden;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }

        .container { width: 100vw; padding: 15px; box-sizing: border-box; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }

        /* --- DASHBOARD LAYOUT --- */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-card .label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; }
        .stat-card .value { font-size: 1.2rem; font-weight: 700; margin-top: 5px; }

        /* --- TABLE SCROLL FIX --- */
        .table-container { 
            width: 100%; overflow-x: auto; 
            border: 1px solid var(--border); border-radius: 8px;
        }
        table { width: 100%; min-width: 500px; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }

        .btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: 600; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="landingPage" class="container">
    <div class="card">
        <h1>Vehicle Expenditure</h1>
        <button class="btn" onclick="signInWithGoogle()">Login with Google</button>
    </div>
</div>

<div id="mainApp" class="container hidden">
    <header style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 style="font-size: 1.4rem;">Dashboard</h1>
        <button class="btn" style="width: auto; padding: 8px 12px;" onclick="signOut()">Logout</button>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><div class="label">Total Dist</div><div class="value" id="stat-distance">0</div></div>
        <div class="stat-card"><div class="label">Economy</div><div class="value" id="stat-mileage">0</div></div>
        <div class="stat-card"><div class="label">Total Spend</div><div class="value" id="stat-total-cost">0</div></div>
        <div class="stat-card"><div class="label">This Month</div><div class="value" id="stat-monthly-cost">0</div></div>
    </div>

    <div class="card">
        <div class="table-container">
            <table>
                <thead><tr><th>Date</th><th>Type</th><th>Odo</th><th>Cost</th><th>Actions</th></tr></thead>
                <tbody id="logTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDZznwqirEhn7kk40ouixwB0hrmGCZGJ0A",
        authDomain: "vehicle-expenditure-85493.firebaseapp.com",
        projectId: "vehicle-expenditure-85493",
        storageBucket: "vehicle-expenditure-85493.firebasestorage.app",
        messagingSenderId: "811209719201",
        appId: "1:811209719201:web:b860a9b368b1756fdd1fe0",
        measurementId: "G-WE7EWWQSML"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // FORCE SESSION PERSISTENCE
    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);

    firebase.auth().onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            document.getElementById('landingPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            loadLogs();
        } else {
            document.getElementById('landingPage').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('hidden');
        }
    });

    function signInWithGoogle() { firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function signOut() { firebase.auth().signOut(); }

    function loadLogs() {
        db.collection('users').doc(currentUser.uid).collection('logs')
            .onSnapshot(snap => {
                const tbody = document.getElementById('logTableBody');
                tbody.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    tbody.innerHTML += `<tr>
                        <td>${data.date}</td>
                        <td>${data.type}</td>
                        <td>${data.odo}</td>
                        <td>${data.totalCost}</td>
                        <td>
                            <button class="action-btn" onclick="alert('Add edit logic here')">✏️</button>
                            <button class="action-btn" onclick="db.collection('users').doc(currentUser.uid).collection('logs').doc('${doc.id}').delete()">🗑️</button>
                        </td>
                    </tr>`;
                });
            });
    }
</script>
</body>
</html>
